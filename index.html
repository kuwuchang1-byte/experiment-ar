<!DOCTYPE html>
<html>
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>物理实验 AR</title>
    <script src="https://aframe.io/releases/1.6.0/aframe.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.5/dist/mindar-image-aframe.prod.js"></script>
    <style>
        body {
            margin: 0;
            padding: 0;
            font-family: Arial, sans-serif;
        }
        #info {
            position: fixed;
            top: 10px;
            left: 10px;
            background: rgba(0,0,0,0.72);
            color: white;
            padding: 10px 15px;
            border-radius: 8px;
            font-size: 14px;
            z-index: 1000;
            line-height: 1.45;
        }
        #status {
            margin-top: 4px;
            color: #ffd36a;
            font-size: 12px;
        }
        #mf-debug {
            margin-top: 4px;
            color: #88ff88;
            font-size: 11px;
        }
        #controls {
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            gap: 12px;
            z-index: 1000;
        }
        #controls button {
            padding: 12px 20px;
            border: none;
            border-radius: 8px;
            font-size: 14px;
            font-weight: bold;
            cursor: pointer;
            background: rgba(0,0,0,0.7);
            color: white;
        }
        #controls button.on {
            background: rgba(50,180,50,0.85);
        }
        #controls button.off {
            background: rgba(180,50,50,0.85);
        }
    </style>
    <script>
        // 跨识别图动态导线组件 v3：空物体 → 模型中心兜底 + 端点圆球调试 + 明显粗导线
        AFRAME.registerComponent('ar-wire', {
            schema: {
                fromTarget: { type: 'selector' },
                toTarget: { type: 'selector' },
                fromModel: { type: 'selector' },
                toModel: { type: 'selector' },
                fromTerminal: { type: 'string' },
                toTerminal: { type: 'string' },
                color: { type: 'color', default: '#222222' },
                radius: { type: 'number', default: 0.04 },
                sag: { type: 'number', default: 0.035 },
                segments: { type: 'number', default: 24 },
                updateInterval: { type: 'number', default: 6 },
                smooth: { type: 'number', default: 0.3 }
            },

            init: function () {
                this.frameCount = 0;
                this.mesh = null;
                this.startSphere = null;
                this.endSphere = null;
                this.wireMaterial = new THREE.MeshBasicMaterial({
                    color: this.data.color,
                    depthTest: false,
                    depthWrite: false
                });
                this.sphereMaterial = new THREE.MeshBasicMaterial({
                    color: this.data.color,
                    depthTest: false,
                    depthWrite: false
                });
                this.lastFrom = null;
                this.lastTo = null;
                this.tempFrom = new THREE.Vector3();
                this.tempTo = new THREE.Vector3();
                this.mid = new THREE.Vector3();
                this.fromFound = false;
                this.toFound = false;
                this.foundEmpty = false; // 调试：是否找到空物体

                // 监听识别事件
                const bindTargetEvents = () => {
                    if (this.data.fromTarget) {
                        this.data.fromTarget.addEventListener('targetFound', () => { this.fromFound = true; });
                        this.data.fromTarget.addEventListener('targetLost', () => {
                            this.fromFound = false;
                            this.setAllVisible(false);
                            this.lastFrom = null;
                            this.lastTo = null;
                        });
                    }
                    if (this.data.toTarget) {
                        this.data.toTarget.addEventListener('targetFound', () => { this.toFound = true; });
                        this.data.toTarget.addEventListener('targetLost', () => {
                            this.toFound = false;
                            this.setAllVisible(false);
                            this.lastFrom = null;
                            this.lastTo = null;
                        });
                    }
                };
                setTimeout(bindTargetEvents, 0);
            },

            tick: function () {
                this.frameCount++;
                if (this.frameCount % this.data.updateInterval !== 0) return;

                const fromTarget = this.data.fromTarget;
                const toTarget = this.data.toTarget;
                const fromModel = this.data.fromModel;
                const toModel = this.data.toModel;

                if (!fromTarget || !toTarget || !fromModel || !toModel) {
                    this.setAllVisible(false);
                    return;
                }

                const fromVisible = this.fromFound || fromTarget.object3D.visible;
                const toVisible = this.toFound || toTarget.object3D.visible;
                if (!fromVisible || !toVisible) {
                    this.setAllVisible(false);
                    return;
                }

                fromModel.object3D.updateMatrixWorld(true);
                toModel.object3D.updateMatrixWorld(true);

                // 先尝试找空物体接线点
                const fromTerminal = fromModel.object3D.getObjectByName(this.data.fromTerminal);
                const toTerminal = toModel.object3D.getObjectByName(this.data.toTerminal);

                if (fromTerminal && toTerminal) {
                    fromTerminal.getWorldPosition(this.tempFrom);
                    toTerminal.getWorldPosition(this.tempTo);
                    if (!this.foundEmpty) {
                        this.foundEmpty = true;
                        console.log('[ar-wire] 空物体已找到:', this.data.fromTerminal, '->', this.data.toTerminal);
                    }
                } else {
                    // 兜底：用模型自身的中心位置
                    this.tempFrom.copy(fromModel.object3D.getWorldPosition(new THREE.Vector3()));
                    this.tempTo.copy(toModel.object3D.getWorldPosition(new THREE.Vector3()));
                    if (this.foundEmpty !== false) {
                        this.foundEmpty = false;
                        console.warn('[ar-wire] 空物体未找到，使用模型中心兜底:', this.data.fromTerminal, this.data.toTerminal);
                    }
                }

                if (!this.lastFrom) {
                    this.lastFrom = this.tempFrom.clone();
                    this.lastTo = this.tempTo.clone();
                } else {
                    this.lastFrom.lerp(this.tempFrom, this.data.smooth);
                    this.lastTo.lerp(this.tempTo, this.data.smooth);
                }

                this.mid.set(
                    (this.lastFrom.x + this.lastTo.x) / 2,
                    (this.lastFrom.y + this.lastTo.y) / 2 + this.data.sag,
                    (this.lastFrom.z + this.lastTo.z) / 2
                );

                // 导线本体
                const curve = new THREE.QuadraticBezierCurve3(this.lastFrom, this.mid, this.lastTo);
                const geometry = new THREE.TubeGeometry(curve, this.data.segments, this.data.radius, 8, false);
                if (this.mesh) {
                    this.mesh.geometry.dispose();
                    this.mesh.geometry = geometry;
                } else {
                    this.mesh = new THREE.Mesh(geometry, this.wireMaterial);
                    this.mesh.renderOrder = 20;
                    this.el.object3D.add(this.mesh);
                }
                this.mesh.visible = true;

                // 端点圆球：方便确认连线位置
                const sphereGeo = new THREE.SphereGeometry(this.data.radius * 3, 8, 8);
                if (this.startSphere) {
                    this.startSphere.geometry.dispose();
                    this.startSphere.geometry = sphereGeo;
                    this.startSphere.position.copy(this.lastFrom);
                } else {
                    this.startSphere = new THREE.Mesh(sphereGeo, this.sphereMaterial);
                    this.startSphere.position.copy(this.lastFrom);
                    this.startSphere.renderOrder = 21;
                    this.el.object3D.add(this.startSphere);
                }
                this.startSphere.visible = true;

                if (this.endSphere) {
                    this.endSphere.geometry.dispose();
                    this.endSphere.geometry = sphereGeo;
                    this.endSphere.position.copy(this.lastTo);
                } else {
                    this.endSphere = new THREE.Mesh(sphereGeo, this.sphereMaterial);
                    this.endSphere.position.copy(this.lastTo);
                    this.endSphere.renderOrder = 21;
                    this.el.object3D.add(this.endSphere);
                }
                this.endSphere.visible = true;
            },

            setAllVisible: function (visible) {
                if (this.mesh) this.mesh.visible = visible;
                if (this.startSphere) this.startSphere.visible = visible;
                if (this.endSphere) this.endSphere.visible = visible;
            },

            remove: function () {
                if (this.mesh) { this.mesh.geometry.dispose(); this.wireMaterial.dispose(); }
                if (this.startSphere) { this.startSphere.geometry.dispose(); }
                if (this.endSphere) { this.endSphere.geometry.dispose(); this.sphereMaterial.dispose(); }
            }
        });

        // 磁感线显隐控制组件：根据两线圈距离 + 点击切换，控制磁感线可见性
        AFRAME.registerComponent('ar-mf-control', {
            schema: {
                coilModel: { type: 'selector' },           // 本线圈模型
                showNames: { type: 'string', default: '' },  // 始终显示的磁感线名（逗号分隔）
                nearNames: { type: 'string', default: '' },  // 近距离显示
                farNames: { type: 'string', default: '' },   // 远距离显示
                otherCoilModel: { type: 'selector' },        // 另一个线圈（用于算距离）
                nearDist: { type: 'number', default: 0.3 },  // R+2r 阈值
                farDist: { type: 'number', default: 0.8 },   // 最远显示距离
                defaultOn: { type: 'boolean', default: true },
                updateInterval: { type: 'number', default: 8 }
            },

            init: function () {
                this.frameCount = 0;
                this.userToggle = this.data.defaultOn;
                this.allMf = [];
                this.showObjs = [];
                this.nearObjs = [];
                this.farObjs = [];
                this.posA = new THREE.Vector3();
                this.posB = new THREE.Vector3();
                this.modelLoaded = false;

                // 模型加载后查找磁感线对象（带重试）
                this.el.addEventListener('model-loaded', () => this._findObjects());
                this._retryCount = 0;
                this._retryTimer = setInterval(() => {
                    if (this.modelLoaded || this._retryCount > 10) { clearInterval(this._retryTimer); return; }
                    this._findObjects();
                    this._retryCount++;
                }, 500);

                // 点击切换
                this.el.addEventListener('click', () => {
                    this.userToggle = !this.userToggle;
                    console.log('[mf-control] toggle:', this.userToggle);
                });
            },

            _findObjects: function () {
                const model = this.data.coilModel;
                if (!model || !model.object3D) return;
                model.object3D.updateMatrixWorld(true);

                // 调试：列出模型里所有对象名
                const listAll = (obj, depth = 0) => {
                    const prefix = '  '.repeat(depth);
                    console.log(prefix + obj.type + ': ' + obj.name + (obj.isMesh ? ' [mesh]' : ''));
                    if (obj.children) obj.children.forEach(c => listAll(c, depth + 1));
                };
                console.log('[mf-control] === 模型对象列表 ===');
                listAll(model.object3D);
                console.log('[mf-control] === 列表结束 ===');

                const parse = (s) => s.split(',').map(n => n.trim()).filter(n => n);
                const find = (names) => {
                    const result = [];
                    names.forEach(name => {
                        const obj = model.object3D.getObjectByName(name);
                        if (obj) { result.push(obj); console.log('[mf-control] found:', name, obj.type); }
                        else { console.warn('[mf-control] NOT found:', name); }
                    });
                    return result;
                };

                this.showObjs = find(parse(this.data.showNames));
                this.nearObjs = find(parse(this.data.nearNames));
                this.farObjs = find(parse(this.data.farNames));
                this.allMf = [...this.showObjs, ...this.nearObjs, ...this.farObjs];
                this.modelLoaded = this.allMf.length > 0;

                // 初始隐藏所有磁感线，等 tick 根据距离决定
                this.allMf.forEach(o => o.visible = false);

                // 更新调试面板
                this._label = this.data.showNames ? '发射' : '接收';
                this._debugEl = document.getElementById('mf-debug');
            },

            tick: function () {
                this.frameCount++;
                if (this.frameCount % this.data.updateInterval !== 0) return;
                if (!this.modelLoaded) return;

                // 计算距离
                let dist = Infinity;
                if (this.data.coilModel && this.data.otherCoilModel) {
                    this.data.coilModel.object3D.updateMatrixWorld(true);
                    this.data.otherCoilModel.object3D.updateMatrixWorld(true);
                    this.data.coilModel.object3D.getWorldPosition(this.posA);
                    this.data.otherCoilModel.object3D.getWorldPosition(this.posB);
                    dist = this.posA.distanceTo(this.posB);
                }

                // 用户关闭了
                if (!this.userToggle) {
                    this.allMf.forEach(o => o.visible = false);
                    return;
                }

                // 始终显示的
                this.showObjs.forEach(o => o.visible = true);

                // 近/远距离切换
                if (this.nearObjs.length || this.farObjs.length) {
                    if (dist < this.data.nearDist) {
                        this.nearObjs.forEach(o => o.visible = true);
                        this.farObjs.forEach(o => o.visible = false);
                    } else if (dist < this.data.farDist) {
                        this.nearObjs.forEach(o => o.visible = false);
                        this.farObjs.forEach(o => o.visible = true);
                    } else {
                        this.nearObjs.forEach(o => o.visible = false);
                        this.farObjs.forEach(o => o.visible = false);
                    }
                }

                // 更新调试面板
                const visCount = this.allMf.filter(o => o.visible).length;
                const debugText = this._label + ': 找到' + this.allMf.length + '个, 显示' + visCount + '个, 距离' + dist.toFixed(3);
                if (this._debugEl && this._label === '接收') this._debugEl.textContent = debugText;
            }
        });

        // 目标粘性保持：target 丢失后保持显示一段时间，避免靠近时互相遮挡导致消失
        AFRAME.registerComponent('ar-sticky-target', {
            schema: {
                holdTime: { type: 'number', default: 3000 }
            },
            init: function () {
                this.lastFound = 0;
                this.el.addEventListener('targetFound', () => { this.lastFound = Date.now(); });
            },
            tick: function () {
                if (Date.now() - this.lastFound < this.data.holdTime && this.lastFound > 0) {
                    this.el.object3D.visible = true;
                }
            }
        });

        // 手机端点击目标：在模型上加一个不可见的盒子，让 raycaster 能命中
        AFRAME.registerComponent('ar-click-target', {
            schema: {
                size: { type: 'number', default: 0.6 }
            },
            init: function () {
                const box = document.createElement('a-box');
                box.setAttribute('width', this.data.size);
                box.setAttribute('height', this.data.size);
                box.setAttribute('depth', this.data.size);
                box.setAttribute('material', 'visible: false');
                box.setAttribute('class', 'clickable');
                this.el.appendChild(box);
            }
        });
    </script>
</head>
<body>
    <div id="info">
        对准识别图，查看 AR 模型效果<br>
        1接收 2空 3电源 4黑箱2 5发射 6空
        点击下方按钮切换磁感线显隐
        <div id="status">已识别：无</div>
        <div id="mf-debug">磁感线：加载中...</div>
    </div>
    <div id="controls">
        <button id="btn-transmit" class="on" onclick="window.toggleMf('transmit')">发射磁感线 ON</button>
        <button id="btn-receive" class="on" onclick="window.toggleMf('receive')">接收磁感线 ON</button>
    </div>
    
    <a-scene mindar-image="imageTargetSrc: targets.mind; maxTrack: 4; filterMinCF: 0.005; filterBeta: 0.005;" 
             color-space="sRGB" 
             renderer="colorManagement: true, physicallyCorrectLights, antialias: true; pixelRatio: 1.5;" 
             vr-mode-ui="enabled: false" 
             device-orientation-permission-ui="enabled: false">
        
        <a-assets>
            <a-asset-item id="asset-box-transmit" src="Model/电源+黑箱1.glb"></a-asset-item>
            <a-asset-item id="asset-coil-transmit" src="Model/发射线圈.glb"></a-asset-item>
            <a-asset-item id="asset-coil-receive" src="Model/接收线圈.glb"></a-asset-item>
            <a-asset-item id="asset-box-receive" src="Model/黑箱2.glb"></a-asset-item>

        </a-assets>

        <a-camera position="0 0 0" look-controls="enabled: false" cursor="rayOrigin: mouse" raycaster="objects: .clickable"></a-camera>
        <a-light type="ambient" color="#ffffff" intensity="0.85"></a-light>
        <a-light type="directional" color="#ffffff" intensity="0.65" position="0 1 1"></a-light>

        <!-- 实测 targetIndex 0: 接收线圈 -->
        <a-entity id="target-coil-receive" mindar-image-target="targetIndex: 0" ar-sticky-target="holdTime: 3000" ar-click-target="size: 0.6" ar-mf-control="
            coilModel: #model-coil-receive;
            nearNames: 磁感线3,磁感线4;
            farNames: 磁感线5,磁感线6;
            otherCoilModel: #model-coil-transmit;
            nearDist: 0.3;
            farDist: 0.8;
            defaultOn: true;
        ">
            <a-gltf-model id="model-coil-receive" src="#asset-coil-receive" position="0 0 0" scale="0.12 0.12 0.12"></a-gltf-model>
        </a-entity>

        <!-- 实测 targetIndex 1: 暂时留空 -->
        <a-entity id="target-empty-1" mindar-image-target="targetIndex: 1"></a-entity>

        <!-- 实测 targetIndex 2: 电源 + 发射端黑箱 -->
        <a-entity id="target-box-transmit" mindar-image-target="targetIndex: 2" ar-sticky-target="holdTime: 2000">
            <a-gltf-model id="model-box-transmit" src="#asset-box-transmit" position="0 0 0" scale="0.045 0.045 0.045"></a-gltf-model>
        </a-entity>

        <!-- 实测 targetIndex 3: 接收端黑箱 -->
        <a-entity id="target-box-receive" mindar-image-target="targetIndex: 3" ar-sticky-target="holdTime: 2000">
            <a-gltf-model id="model-box-receive" src="#asset-box-receive" position="0 0 0" scale="0.27 0.27 0.27"></a-gltf-model>
        </a-entity>

        <!-- 实测编号 5 / targetIndex 4: 发射线圈 -->
        <a-entity id="target-coil-transmit" mindar-image-target="targetIndex: 4" ar-sticky-target="holdTime: 3000" ar-click-target="size: 0.6" ar-mf-control="
            coilModel: #model-coil-transmit;
            showNames: 磁感线1,磁感线2;
            otherCoilModel: #model-coil-receive;
            defaultOn: true;
        ">
            <a-gltf-model id="model-coil-transmit" src="#asset-coil-transmit" position="0 0 0" scale="0.09 0.09 0.09"></a-gltf-model>
        </a-entity>



        <!-- 动态导线：发射端红线，黑箱输出+ -> 发射线圈输入 -->
        <a-entity ar-wire="
            fromTarget: #target-box-transmit;
            toTarget: #target-coil-transmit;
            fromModel: #model-box-transmit;
            toModel: #model-coil-transmit;
            fromTerminal: box_transmit_out_red;
            toTerminal: coil_transmit_in_red;
            color: #cc2020;
            radius: 4;
            sag: 0.04;
            updateInterval: 6;
        "></a-entity>

        <!-- 动态导线：发射端黑线，黑箱输入- -> 发射线圈输出 -->
        <a-entity ar-wire="
            fromTarget: #target-box-transmit;
            toTarget: #target-coil-transmit;
            fromModel: #model-box-transmit;
            toModel: #model-coil-transmit;
            fromTerminal: box_transmit_in_black;
            toTerminal: coil_transmit_out_black;
            color: #111111;
            radius: 4;
            sag: 0.035;
            updateInterval: 6;
        "></a-entity>

        <!-- 动态导线：接收端红线，接收线圈输出 -> 黑箱2正极输入 -->
        <a-entity ar-wire="
            fromTarget: #target-coil-receive;
            toTarget: #target-box-receive;
            fromModel: #model-coil-receive;
            toModel: #model-box-receive;
            fromTerminal: coil_receive_out_red;
            toTerminal: box_receive_in_red;
            color: #cc2020;
            radius: 4;
            sag: 0.04;
            updateInterval: 6;
        "></a-entity>

        <!-- 动态导线：接收端黑线，接收线圈输入 -> 黑箱2负极输出 -->
        <a-entity ar-wire="
            fromTarget: #target-coil-receive;
            toTarget: #target-box-receive;
            fromModel: #model-coil-receive;
            toModel: #model-box-receive;
            fromTerminal: coil_receive_in_black;
            toTerminal: box_receive_out_black;
            color: #111111;
            radius: 4;
            sag: 0.035;
            updateInterval: 6;
        "></a-entity>
    </a-scene>
    <script>
        // 全局磁感线切换函数
        window.toggleMf = function (coil) {
            const id = coil === 'transmit' ? 'target-coil-transmit' : 'target-coil-receive';
            const el = document.getElementById(id);
            if (!el || !el.components['ar-mf-control']) return;
            const comp = el.components['ar-mf-control'];
            comp.userToggle = !comp.userToggle;
            const btn = document.getElementById('btn-' + coil);
            if (btn) {
                btn.textContent = (coil === 'transmit' ? '发射磁感线 ' : '接收磁感线 ') + (comp.userToggle ? 'ON' : 'OFF');
                btn.className = comp.userToggle ? 'on' : 'off';
            }
        };
        // 手机端调试提示：显示当前 MindAR 实际识别到的编号，方便判断连线是否具备显示条件。
        window.addEventListener('DOMContentLoaded', function () {
            const labels = {
                'target-coil-receive': '1接收',
                'target-empty-1': '2空',
                'target-box-transmit': '3电源',
                'target-box-receive': '4黑箱2',
                'target-coil-transmit': '5发射',
                'target-empty-5': '6空'
            };
            const found = new Set();
            const status = document.getElementById('status');
            const update = () => {
                status.textContent = '已识别：' + (found.size ? Array.from(found).join('、') : '无');
            };
            Object.keys(labels).forEach(id => {
                const el = document.getElementById(id);
                if (!el) return;
                el.addEventListener('targetFound', () => { found.add(labels[id]); update(); });
                el.addEventListener('targetLost', () => { found.delete(labels[id]); update(); });
            });
        });
    </script>
</body>
</html>
